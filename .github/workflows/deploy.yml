name: Build & Deploy to Hostinger

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (static export)
        run: npm run build

      - name: Validate FTP settings
        run: |
          if [ -z "${{ secrets.FTP_SERVER || vars.FTP_SERVER }}" ]; then
            echo "Missing FTP_SERVER. Add it in GitHub > Settings > Secrets and variables > Actions."
            exit 1
          fi
          if [ -z "${{ secrets.FTP_USERNAME || vars.FTP_USERNAME }}" ]; then
            echo "Missing FTP_USERNAME. Add it in GitHub > Settings > Secrets and variables > Actions."
            exit 1
          fi
          if [ -z "${{ secrets.FTP_PASSWORD || vars.FTP_PASSWORD }}" ]; then
            echo "Missing FTP_PASSWORD. Add it in GitHub > Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER || vars.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME || vars.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD || vars.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: /public_html/
          dangerous-clean-slate: false
